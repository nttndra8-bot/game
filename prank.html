<!DOCTYPE html>
<html>
<head>
  <title>System Hack</title>
  <style>
    body {
      background: black;
      color: lime;
      font-family: monospace;
      padding: 20px;
    }
  </style>
</head>
<body>

<h2>⚠️ SYSTEM HACKED ⚠️</h2>
<p id="text"></p>

<script>
let messages = [
  "Mengakses data...",
  "Membuka file rahasia...",
  "Mengirim data ke server...",
  "Menghapus sistem...",
  "ERROR!!!"
];

let i = 0;

function showText() {
  if (i < messages.length) {
    document.getElementById("text").innerHTML += messages[i] + "<br>";
    i++;
    setTimeout(showText, 1000);
  } else {
    alert("😆 Kena prank bro!");
  }
}

showText();
</script>

</body>
</html>
